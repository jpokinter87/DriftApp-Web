name: CI

on:
  push:
    branches: [main, 'v5.0/*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DRIFTAPP_DEBUG: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check core/ services/ web/

      - name: Tests
        run: uv run pytest tests/ --tb=short

      - name: Coverage report
        run: uv run pytest tests/ --cov=core --cov=services --cov-report=term-missing
